<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    h1 {
      font-size: 2.2rem;
      margin-bottom: 0.4rem;
      letter-spacing: 2px;
      color: #e94560;
    }

    #status {
      font-size: 1.1rem;
      margin-bottom: 1.4rem;
      min-height: 1.5em;
      color: #a8dadc;
      font-weight: 600;
    }

    #score {
      display: flex;
      gap: 2rem;
      margin-bottom: 1.6rem;
      font-size: 1rem;
    }

    .score-box {
      text-align: center;
      background: #16213e;
      border-radius: 10px;
      padding: 0.5rem 1.2rem;
      border: 2px solid transparent;
    }

    .score-box.active { border-color: #e94560; }
    .score-box span { display: block; font-size: 1.6rem; font-weight: 700; }
    .score-x span { color: #e94560; }
    .score-o span { color: #a8dadc; }
    .score-draw span { color: #888; }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 10px;
    }

    .cell {
      background: #16213e;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3.2rem;
      font-weight: 900;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) { background: #0f3460; transform: scale(1.04); }
    .cell.x { color: #e94560; }
    .cell.o { color: #a8dadc; }
    .cell.win { background: #0f3460; box-shadow: 0 0 18px rgba(233,69,96,0.5); }

    #reset {
      margin-top: 1.6rem;
      padding: 0.65rem 2rem;
      border: none;
      border-radius: 8px;
      background: #e94560;
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.15s, transform 0.1s;
    }

    #reset:hover { background: #c73652; transform: scale(1.04); }

    #mode {
      margin-top: 0.9rem;
      font-size: 0.85rem;
      color: #555;
      cursor: pointer;
      text-decoration: underline;
    }

    #mode:hover { color: #a8dadc; }
  </style>
</head>
<body>

<h1>TIC TAC TOE</h1>
<div id="status">X's turn</div>

<div id="score">
  <div class="score-box score-x active" id="box-x">
    X <span id="score-x">0</span>
  </div>
  <div class="score-box score-draw">
    Draw <span id="score-draw">0</span>
  </div>
  <div class="score-box score-o" id="box-o">
    O <span id="score-o">0</span>
  </div>
</div>

<div id="board">
  <div class="cell" data-i="0"></div>
  <div class="cell" data-i="1"></div>
  <div class="cell" data-i="2"></div>
  <div class="cell" data-i="3"></div>
  <div class="cell" data-i="4"></div>
  <div class="cell" data-i="5"></div>
  <div class="cell" data-i="6"></div>
  <div class="cell" data-i="7"></div>
  <div class="cell" data-i="8"></div>
</div>

<button id="reset">New Game</button>
<div id="mode">Switch to: vs Computer</div>

<script>
  const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
  const cells = document.querySelectorAll('.cell');
  const status = document.getElementById('status');
  const resetBtn = document.getElementById('reset');
  const modeBtn = document.getElementById('mode');
  const scoreX = document.getElementById('score-x');
  const scoreO = document.getElementById('score-o');
  const scoreDraw = document.getElementById('score-draw');
  const boxX = document.getElementById('box-x');
  const boxO = document.getElementById('box-o');

  let board, current, over, vsComputer;
  let scores = { X: 0, O: 0, D: 0 };
  vsComputer = false;

  function init() {
    board = Array(9).fill('');
    current = 'X';
    over = false;
    cells.forEach(c => { c.textContent = ''; c.className = 'cell'; });
    setStatus(`X's turn`);
    highlight();
  }

  function setStatus(msg) { status.textContent = msg; }

  function highlight() {
    boxX.classList.toggle('active', current === 'X');
    boxO.classList.toggle('active', current === 'O');
  }

  function checkWin(b, p) {
    return WINS.find(([a, c, d]) => b[a] === p && b[c] === p && b[d] === p) || null;
  }

  function play(i) {
    if (over || board[i]) return;
    board[i] = current;
    const cell = cells[i];
    cell.textContent = current;
    cell.classList.add(current.toLowerCase(), 'taken');

    const win = checkWin(board, current);
    if (win) {
      win.forEach(idx => cells[idx].classList.add('win'));
      setStatus(`${current} wins!`);
      scores[current]++;
      scoreX.textContent = scores.X;
      scoreO.textContent = scores.O;
      over = true;
      return;
    }

    if (board.every(v => v)) {
      setStatus(`It's a draw!`);
      scores.D++;
      scoreDraw.textContent = scores.D;
      over = true;
      return;
    }

    current = current === 'X' ? 'O' : 'X';
    highlight();
    setStatus(`${current}'s turn`);

    if (vsComputer && current === 'O' && !over) {
      setTimeout(computerMove, 350);
    }
  }

  function computerMove() {
    const move = bestMove();
    if (move !== null) play(move);
  }

  function bestMove() {
    // Try to win
    for (let i = 0; i < 9; i++) {
      if (!board[i]) {
        board[i] = 'O';
        if (checkWin(board, 'O')) { board[i] = ''; return i; }
        board[i] = '';
      }
    }
    // Block X from winning
    for (let i = 0; i < 9; i++) {
      if (!board[i]) {
        board[i] = 'X';
        if (checkWin(board, 'X')) { board[i] = ''; return i; }
        board[i] = '';
      }
    }
    // Prefer center, then corners, then edges
    const pref = [4, 0, 2, 6, 8, 1, 3, 5, 7];
    return pref.find(i => !board[i]) ?? null;
  }

  cells.forEach(cell => cell.addEventListener('click', () => {
    if (vsComputer && current === 'O') return;
    play(parseInt(cell.dataset.i));
  }));

  resetBtn.addEventListener('click', init);

  modeBtn.addEventListener('click', () => {
    vsComputer = !vsComputer;
    modeBtn.textContent = vsComputer ? 'Switch to: 2 Players' : 'Switch to: vs Computer';
    scores = { X: 0, O: 0, D: 0 };
    scoreX.textContent = 0; scoreO.textContent = 0; scoreDraw.textContent = 0;
    init();
  });

  init();
</script>
</body>
</html>
